<!DOCTYPE html>

<head>

<style>

/* ================= UI DESIGN ================= */
body{
  margin:0;
  font-family:'Inter',sans-serif;

  background:
    radial-gradient(circle at top left,#132347,#081120 40%),
    #081120;

  color:#eaf2ff;

  min-height:100vh;

  letter-spacing:-0.2px;
}

h2 { text-align:center; color:#93c5fd; }

form{

  max-width:1150px;

  margin:30px auto;

  padding:34px;

  background:rgba(17,24,39,0.72);

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(18px);

  -webkit-backdrop-filter:blur(18px);

  border-radius:28px;

  box-shadow:
    0 10px 40px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.05);

  display:grid;

  grid-template-columns:repeat(2,1fr);

  gap:22px 30px;
}


.field input,
.field select {
  width: 100%;
  box-sizing: border-box;
}
.field select,
.field input{

  height:42px;
  width:100%;
  box-sizing:border-box;
}

label{

  color:#8ea7d0;

  font-size:13px;

  font-weight:600;

  margin-bottom:8px;
}

input,
select{

  

  width:100%;

  height:50px;

  padding:0 16px;

  border-radius:16px;

  border:1px solid rgba(255,255,255,0.08);

  background:rgba(255,255,255,0.04);

  color:#ffffff;

  font-size:14px;

  font-weight:500;

  outline:none;

  transition:0.25s ease;

  box-sizing:border-box;
}
/* DROPDOWN OPTIONS CONTRAST */

select option{

  background:#0f172a;   /* dark dropdown background */

  color:#ffffff;        /* white text */

  padding:10px;
}

/* Selected option */

select option:checked{

  background:#2563eb;

  color:white;
}
input:focus,
select:focus{

  border-color:#3b82f6;

  background:rgba(255,255,255,0.07);

  box-shadow:
    0 0 0 4px rgba(59,130,246,0.15);
}

.full { grid-column: span 2; }

.error {
  color:red;
  font-size:12px;
  min-height:16px;   /* keeps rows aligned */
}

/* ================= MODERN BUTTON UI ================= */

.button-row{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:10px;
}

.button-row button,
.topbar button{

  width:auto;
  min-width:120px;
  padding:10px 18px;

  border:none;
  border-radius:10px;

  font-size:14px;
  font-weight:600;

  cursor:pointer;

  transition:all 0.25s ease;

  box-shadow:
    0 4px 10px rgba(0,0,0,0.25);
}

/* PRIMARY BUTTON */
.button-row button:not(.back-btn):not(.export-btn),
.topbar button:not(.back-btn):not(.export-btn){

  background:linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

  color:white;
}

/* EXPORT BUTTON */
.export-btn{

  background:linear-gradient(
    135deg,
    #0fc451,
    #14c555
  );

  color:white;
}

/* BACK BUTTON */
.back-btn{

  background:linear-gradient(
    135deg,
    #1a62c6,
    #2d77dd
  );

  color:white;
}

/* HOVER EFFECT */
.button-row button:hover,
.topbar button:hover{

  transform:translateY(-2px);

  box-shadow:
    0 8px 18px rgba(0,0,0,0.35);
}

/* CLICK EFFECT */
.button-row button:active,
.topbar button:active{

  transform:scale(0.97);
}

#freeboardRow { display:none; }

/* ================= DASHBOARD ================= */
.dashboard {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  gap:20px; 
}

/* ================= DASHBOARD BUTTONS ================= */

.dashboard button{

  width:280px;

  height:64px;

  border:none;

  border-radius:22px;

  background:rgba(255,255,255,0.06);

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(16px);

  color:white;

  font-size:15px;

  font-weight:600;

  letter-spacing:0.3px;

  cursor:pointer;

  transition:0.25s ease;

  box-shadow:
    0 10px 24px rgba(0,0,0,0.35);
}

/* Hover */
.dashboard button:hover{

  transform:translateY(-2px);

  box-shadow:
    0 8px 18px rgba(0,0,0,0.35);
}

/* Click */
.dashboard button:active{

  transform:scale(0.97);
}




.page-title{

  text-align:center;

  font-size:38px;

  font-weight:700;

  color:white;

  margin-top:26px;

  margin-bottom:18px;

  letter-spacing:-1px;
}

#previewTable th,
#previewTable td{

  border:1px solid rgba(255,255,255,0.06);

  padding:14px;

  font-size:13px;
}

#previewTable tbody tr:nth-child(even){

  background:rgba(255,255,255,0.03);
}

#previewTable tbody tr:hover{
  background:#1e293b;
}

#mainForm form{

  align-items:start;
}

#mainForm .field{

  justify-content:flex-start;
}

/* ================= DATASHEET ================= */

.table-container{
    width:100%;
    margin:auto;
    background:white;
    border:1px solid black;
}

.table-container table{
    width:100%;
    border-collapse:collapse;
}

.table-container td{
    border:1px solid #555;
    padding:10px;
    font-size:16px;
    vertical-align:middle;
    color:black;
}

.category{
    width:220px;
    text-align:center;
    background:#f8f8f8;
    font-weight:bold;
}

.parameter{
    width:260px;
    background:#fafafa;
}

.value{
    width:auto;
    background:white;
}

.value input{
    width:100%;
    border:none;
    outline:none;
    font-size:16px;
    font-family:"Times New Roman";
    background:transparent;
    color:black;
}

.wrapper{
    position:relative;
}

.watermark{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:160px;
    color:rgba(0,0,0,0.08);
    pointer-events:none;
}

.button-row{
  display:flex;
  gap:10px;
  align-items:end;
  justify-content:flex-start;
}

.button-row button{
  min-width:120px;
  height:42px;
}

/* ================= BUTTON CONTAINER ================= */
/* ================= BUTTON CONTAINER ================= */

.button-container{

  display:flex;
  flex-direction:row;

  align-items:center;      /* vertical alignment */
  justify-content:space-evenly;

  gap:18px;

  width:100%;
  height:42px;

  margin-top:22px;   /* aligns with Sheet No */
}

/* ================= GLASS BUTTONS ================= */

.button-container button{

  flex:1;

  max-width:170px;

  height:52px;

  border:none;

  border-radius:18px;

  background:linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

  color:white;

  font-size:14px;

  font-weight:600;

  cursor:pointer;

  transition:all 0.25s ease;

  box-shadow:
    0 8px 22px rgba(37,99,235,0.35);
}

.button-container button:hover{

  transform:translateY(-3px);

  box-shadow:
    0 14px 28px rgba(37,99,235,0.45);
}
/* ================= TOP LEFT LOGO ================= */

.top-logo{

  position:fixed;

  top:15px;
  left:15px;

  width:120px;     /* adjust size */
  height:auto;

  z-index:9999;
}


.field{
  display:flex;
  flex-direction:column;
  width:100%;
  min-height:85px;

  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.04);
  padding:18px;
  border-radius:22px;
  transition:0.25s ease;

  box-sizing:border-box;
}

.field:hover{

  background:rgba(255,255,255,0.04);

}

</style>
</head>


  <body>

<!-- TOP LEFT LOGO -->
<img src="wog_logo.jpg" class="top-logo">


<div id="dashboard" class="dashboard">
  

  <h2>Main Dashboard</h2>

  <button onclick="openPage()">Instrument Index</button>

</div>

<!-- ================= PAGE UI ================= -->
<div id="mainForm" style="display:none;">
  
  <h1 class="page-title">Instrument Index</h1>

  <form id="formGrid" onsubmit="return false;">


<div class="field"><label>Tag</label><input id="tag"></div>

<div class="field">
  <label>Project</label>

  <select id="project" onchange="loadSavedData()">
    <option value="">-- Select Project --</option>

    <option>BHEL Koderma</option>

    <option>RIL-VCM</option>

  </select>
</div>


<div class="field">
<label>Description</label>
<select id="desc" onchange="updateFields()">
<option></option>
<option>Pressure Gauge</option>
<option>Pressure Transmitter</option>
<option>Pressure Switch</option>
<option>Rotameter</option>
<option>Flow Transmitter</option>
<option>Level Gauge</option>
<option>Level Transmitter</option>
<option>Level Switch</option>
<option>Temperature Gauge</option>

</select>
</div>

<div class="field"><label>Type</label><select id="type"></select></div>
<div class="field"><label>Service Line</label><input id="service"></div>

<div class="field">
<label>Fluid Handled</label>
<select id="fluid">
<option value="">--Select--</option>

<option>Sodium Hypochlorite</option>

<option>Ozone</option>
<option>Calcium Hypochlorite</option>
<option>Hydrogen Peroxide</option>

<option>Ferric Sulfate</option>
<option>Ferrous Sulfate</option>

<!-- Metals -->

<option>SS304</option>

<option>HDPE</option>
<option>PVC</option>

<option>PP (Polypropylene)</option>
<option>PTFE (Teflon)</option>
<option>PVDF</option>

   Not compatible with Line MOC

    ← Back

<!-- ✅ PREVIEW HERE -->
<h3 style="grid-column: span 2; text-align:center; color:#93c5fd;">

</h3>

<div style="grid-column: span 2; overflow-x:auto;">
  <table id="previewTable" style="width:100%; border-collapse:collapse; text-align:center;">

      <tr>
        <th>Tag</th>

        <th>Type</th>
        <th>Service</th>

        <th>Fluid</th>

        <th>Normal Range</th>
        <th>Freeboard</th>
        <th>Max Range</th>
        <th>Eng Unit</th>
        <th>Set Range</th>

        <th>Process Connection</th>
        <th>P&ID No.</th>
        <th>Sheet No.</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

</form>   <!-- ONLY ONE closing form here -->

<script>
  

  function goBack(){
  document.getElementById("mainForm").style.display = "none";
  document.getElementById("dashboard").style.display = "flex";
}
  function openPage(){
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("mainForm").style.display = "block";
}

/* ================= DATA MODEL ================= */
const db = {
"Pressure Gauge": { unit:"kg/cm²", conn:'1/2" NPT (Male)', type:["Bourdon", "Diaphragm", "Differential"], calc:"pressure" },
"Pressure Transmitter": { unit:"kg/cm²", conn:'1/2" NPT (Female)', type:["Bourdon", "Diaphragm", "Differential"], calc:"pressure" },
"Pressure Switch": { unit:"kg/cm²", conn:'1/2" NPT (Female)', type:["Bourdon", "Diaphragm", "Differential"], calc:"pressure" },

"Rotameter": { unit:"m³/hr", conn:'1\" FLANGE', type:["BYPASS","ONLINE"], calc:"flow" },
"Flow Transmitter": { unit:"m³/hr", conn:'1\" FLANGE', type:["Ultrasonic","Vortex","Electromagnetic","Coriolis"], calc:"flow" },

"Level Gauge": { unit:"mm", conn:'1\" #150 FLANGE', type:["Reflex","Tubular","Float and Board"], calc:"level" },
"Level Transmitter": { unit:"mm", conn:'3\" #150 FLANGE', type:["Guided Wave Radar","Capacitance","Hydrostatic","DP Type"], calc:"level" },
"Level Switch": { unit:"mm", conn:'3\" #150 FLANGE', type:["Float","Displacer","Capacitive","Vibrating Fork","Magnetic"], calc:"level" },

"Temperature Gauge": { unit:"°C", conn:"Thermowell", type:["Bimetallic","Mercury"], calc:"temp" },
"Temperature Transmitter": { unit:"°C", conn:"Thermowell", type:["RTD","Thermocouple"], calc:"temp" },

"Analyser": {
  conn:'1/2" NPT (F)',
  calc:"analyzer",
  types:{
    "pH Analyzer":"pH",
    "Conductivity Analyzer":"µS/cm",
    "TDS":"ppm",
    "Dissolved Oxygen":"ppm",
    "Turbidity":"NTU",
    "Chlorine":"ppm",
    "ORP":"mV",
    "Silica":"ppb",
    "Sodium":"ppb",
    "TOC":"ppm",
    "COD":"mg/L",
    "BOD":"mg/L",
    "Oil-in-Water":"ppm"
  }
}
};

function checkCompatibility(){

let fluidVal =
document.getElementById("fluid").value;

let mocVal =
document.getElementById("moc").value;

let compatWarning =
document.getElementById("compatWarning");

/* Reset */
compatWarning.style.display = "none";

if(!fluidVal || !mocVal){

  compatWarning.style.display = "none";
  return;

}

const compatibilityDB = {

"Sodium Hypochlorite": {
  preferred: {
    1:"PVDF",
    2:"CPVC",
    3:"PVC",
    4:"PTFE (Teflon)"
  }
},

"Hydrochloric Acid (HCl)": {
  preferred: {
    1:"PTFE (Teflon)",
    2:"Rubber Lined Steel",
    3:"PVC",
    4:"CPVC"
  }
},

"Sulfuric Acid (H₂SO₄)": {
  preferred: {
    1:"PTFE (Teflon)",
    2:"PVDF",
    3:"Rubber Lined Steel",
    4:"SS316"
  }
},

"Nitric Acid (HNO₃)": {
  preferred: {
    1:"SS316",
    2:"PVDF",
    3:"PTFE (Teflon)",
    4:"CPVC"
  }
},

"Sodium Hydroxide (NaOH)": {
  preferred: {
    1:"PP (Polypropylene)",
    2:"HDPE",
    3:"SS316",
    4:"PVC"
  }
},

"Potassium Hydroxide (KOH)": {
  preferred: {
    1:"PP (Polypropylene)",
    2:"HDPE",
    3:"SS316",
    4:"PVC"
  }
},

"Ferric Chloride": {
  preferred: {
    1:"Rubber Lined Steel",
    2:"HDPE",
    3:"PVC",
    4:"CPVC"
  }
},

"Ferric Sulfate": {
  preferred: {
    1:"Rubber Lined Steel",
    2:"HDPE",
    3:"PP (Polypropylene)",
    4:"PVC"
  }
},

"Ferrous Sulfate": {
  preferred: {
    1:"Rubber Lined Steel",
    2:"HDPE",
    3:"PVC",
    4:"PP (Polypropylene)"
  }
},

"Aluminum Sulfate (Alum)": {
  preferred: {
    1:"HDPE",
    2:"Rubber Lined Steel",
    3:"PVC",
    4:"PP (Polypropylene)"
  }
},

"Polyaluminum Chloride (PAC)": {
  preferred: {
    1:"HDPE",
    2:"PP (Polypropylene)",
    3:"PVC",
    4:"Rubber Lined Steel"
  }
},

"Polyferric Sulfate (PFS)": {
  preferred: {
    1:"Rubber Lined Steel",
    2:"HDPE",
    3:"PP (Polypropylene)",
    4:"PVC"
  }
},

"Polyacrylamide (PAM)": {
  preferred: {
    1:"SS316",
    2:"HDPE",
    3:"PP (Polypropylene)",
    4:"PVC"
  }
},

"Hydrogen Peroxide": {
  preferred: {
    1:"PVDF",
    2:"SS316",
    3:"PTFE (Teflon)",
    4:"HDPE"
  }
},

"Calcium Hypochlorite": {
  preferred: {
    1:"PVC",
    2:"CPVC",
    3:"HDPE",
    4:"PVDF"
  }
},

"Chlorine": {
  preferred: {
    1:"PVDF",
    2:"PTFE (Teflon)",
    3:"CPVC"
  
  }
},

"Chlorine Dioxide": {
  preferred: {
    1:"PVDF",
    2:"PTFE (Teflon)",
    3:"CPVC",
    4:"HDPE"
  }
},

"Ozone": {
  preferred: {
    1:"PTFE (Teflon)",
    2:"PVDF",
    3:"SS316L"
    
  }
},

"Activated Carbon": {
  preferred: {
    1:"Carbon Steel",
    2:"SS304",
    3:"SS316",
    4:"HDPE"
  }
},

"Sodium Bisulfite": {
  preferred: {
    1:"PVC",
    2:"HDPE",
    3:"PP (Polypropylene)",
    
  }
}

};

/* Find chemical */
let chem = compatibilityDB[fluidVal];

if(!chem){

  compatWarning.style.display = "block";
  compatWarning.style.color = "orange";
  compatWarning.innerText = "Compatibility data not available";

  return;
}

/* Compatible */

let rank = Object.keys(chem.preferred)
.find(key => chem.preferred[key] === mocVal);

if(rank){

  compatWarning.style.display = "block";
  compatWarning.style.color = "#22c55e";

  compatWarning.innerText =
    "✔ Preferred MOC - Preference #" + rank;

}
else{

  compatWarning.style.display = "block";
  compatWarning.style.color = "#f97316";

  /* Get top 3 recommendations */
  let suggestions = Object.values(chem.preferred)
                          .slice(0,3)
                          .join(", ");

  compatWarning.innerHTML =
    `
    ✖ Not Preferred for this Chemical
    <br>
    <span style="color:#22c55e;">
      Suggested MOC:
      ${suggestions}
    </span>
    `;

}
}

/* ================= VALIDATION ================= */
function validateNormal(e) {

  const allowedKeys = [
    "Backspace", "Delete", "Tab",
    "ArrowLeft", "ArrowRight",
    "ArrowUp", "ArrowDown"
  ];

  if (allowedKeys.includes(e.key)) {
    return;
  }

  // Allow only digits
  if (!/^[0-9]$/.test(e.key)) {

    e.preventDefault();

    document.getElementById("normalError").innerText =
      "Only numbers allowed";

  } else {

    document.getElementById("normalError").innerText = "";

  }
}

function validateSize(e) {

  const allowedKeys = [
    "Backspace", "Delete", "Tab",
    "ArrowLeft", "ArrowRight",
    "ArrowUp", "ArrowDown"
  ];

  if (allowedKeys.includes(e.key)) {
    return;
  }

  // Allow only numbers
  if (!/^[0-9]$/.test(e.key)) {

    e.preventDefault();

    document.getElementById("sizeError").innerText =
      "Only numbers allowed";

  } else {

    document.getElementById("sizeError").innerText = "";

  }
}

/* ================= FIELD UPDATE LOGIC ================= */
function updateFields(){

let d = desc.value;
let c = db[d];

type.innerHTML="";
unit.value="";
conn.value="";
freeboardRow.style.display="none";
normalLabel.innerText="Normal Range";

if(!c) return;

/* Populate Types */
if(c.type){
  c.type.forEach(t=>type.innerHTML+=`<option>${t}</option>`);
}

/* Analyzer Type + Unit Auto */
/* Populate Types */

if(d === "Analyser"){

  for(let k in c.types){
    type.innerHTML += `<option value="${k}">${k}</option>`;
  }

  unit.value = c.types[Object.keys(c.types)[0]];

}
document.getElementById("type").onchange = function(){

  let d = desc.value;

  if(d === "Analyser"){

    unit.value = db[d].types[this.value];

  }

};  

/* Autofill */
if(c.unit) unit.value = c.unit;
if(c.conn) conn.value = c.conn;

/* Level UI */
if(c.calc==="level"){
  freeboardRow.style.display="block";
  normalLabel.innerText="Normal Range (SWD)";
}

}

/* ================= CALCULATION ENGINE ================= */
function autoCalculate(){

let d = desc.value;
let c = db[d];
let n = parseFloat(normal.value);

if(!c || isNaN(n)) return;

/* Pressure + Temperature */
if(c.calc==="pressure" || c.calc==="temp"){
  let maxVal = 1.2*n;
  let std=[1,1.6,2.5,4,6,10,16,25,40,60,100,160,250,400,600];
  let sel = std.find(r=>maxVal<=r) || 600;

  max.value = maxVal.toFixed(2);
  setrange.value = "0-"+sel;
  insrange.value = "0-"+sel;
}

/* Flow */
if(c.calc==="flow"){
  let maxVal = 1.2*n;
  max.value = maxVal.toFixed(2);
  setrange.value = "0-"+maxVal.toFixed(2);
  insrange.value = "0-"+(n/0.8).toFixed(2);
}

/* Level */
if(c.calc==="level"){
  let fb = parseFloat(freeboard.value)||0;
  let m = n + fb;

  max.value = m;
  setrange.value = "0-"+m;
  insrange.value = "0-"+m;
}

/* Analyzer */
if(c.calc==="analyzer"){
  max.value = (1.2*n).toFixed(2);
  setrange.value = "0-"+(1.5*n).toFixed(2);
  insrange.value = "0-"+(1.6*n).toFixed(2);
}

}

/* ================= DATA STORAGE ================= */

/* Load only selected project data */
let saved = localStorage.getItem(

);

tbody.innerHTML = "";

function addData(){

/* VALIDATION */

if(!project.value){
  alert("Select Project");
  return;
}

if(!tag.value){
  alert("Enter Tag");
  return;
}

if(!desc.value){
  alert("Select Description");
  return;
}

let entry = {

Project: project.value,
Tag:tag.value,
Description:desc.value,
Type:type.value,
Service:service.value,
LineSize:size.value,
Fluid:fluid.value,
MOC:moc.value,
LineNo:lineno.value,
Normal:normal.value,
Freeboard: freeboard.value ? freeboard.value : "NA",
Max:max.value,
Unit:unit.value,
SetRange:setrange.value,
InstrumentRange:insrange.value,
PID:pid.value,
Sheet:sheet.value,
Connection:conn.value

};

let exists = data.some(d => d.Tag === entry.Tag);

if(exists){
  alert("Tag already exists");
  return;
}

data.push(entry);

/* SAVE DATA */
localStorage.setItem(
  "instrumentData_" + project.value,
  JSON.stringify(data)
);

/* ==== ADD TO PREVIEW TABLE ==== */

let tbody = document.querySelector("#previewTable tbody");

/* Add Project Header Only Once */

/* ================= EXCEL EXPORT ================= */
function downloadExcel(){

if(!data.length){
  alert("No data");
  return;
}

let ws = XLSX.utils.json_to_sheet(data);

/* Column width */
ws['!cols'] = Object.keys(data[0]).map(()=>({wch:20}));

/* Borders + alignment */
Object.keys(ws).forEach(cell=>{
  if(cell[0]==='!') return;
  ws[cell].s={
    alignment:{horizontal:"center",vertical:"center"},
    border:{
      top:{style:"thin"},
      bottom:{style:"thin"},
      left:{style:"thin"},
      right:{style:"thin"}
    }
  };
});

let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Instrument Index");

/* Ask user for file name */
let fileName = prompt(
  "Please write down Excel File Name",
  "Instrument_Index"
);

/* Cancel pressed */

if(fileName === null){

  return;

}

/* Empty name */

if(fileName.trim() === ""){

  alert("File name cannot be empty");

  return;

}

/* Add .xlsx automatically */
if(!fileName.endsWith(".xlsx")){
  fileName += ".xlsx";
}

XLSX.writeFile(wb, fileName, {cellStyles:true});

}
